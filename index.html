    <!-- Service Worker (à ajouter dans un fichier séparé et enregistré avec l'extension .js) -->

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js?guitarlab=2x')

            })
            .catch(function (error) {

    </script>
        <style type="text/css">

</head>

<body>
    <div id="start">
        <img src="assets/icon.svg">
    </div>

  <script>
    
  


// quelques fonctions utilitaires
function loadScript(scripts, callback) {

    const script = document.createElement('script');
    script.src = scripts[0];
    document.body.appendChild(script);
    script.onload = function() {
        callback();
    };
}
function loadStyles(styles) {


    const style = document.createElement('link');
    style.rel = 'stylesheet';
    style.href = styles[0]+'?='+Date.now();
    document.head.appendChild(style);
    style.onload = function() {
        if (styles.length > 1) {
            loadStyles(styles.slice(1));
        }
    };
}
function loadScripts(scripts) {


    const script = document.createElement('script');
    script.src = scripts[0]+'?='+Date.now();
    document.body.appendChild(script);
    script.onload = function() {
        if (scripts.length > 1) {
            loadScripts(scripts.slice(1));
        } 
    };
}

loadStyles([
    'css/gao-fonticons-max.css',
    'css/style.css'
    ]);
loadScripts(['js/three.min.js', 'js/OrbitControls.js', 'js/STLLoader.js', 'js/MTLLoader.js', 'js/OBJLoader.js', 'js/Detector.js', 'js/stats.min.js', 'music-theory.js', 'gao.js']);
//window.chordPad = [];

window.onload = function() {

// Tone js need an user action context to start audio...

    var useraction = document.getElementById ('start');
    useraction.addEventListener('click', function () {
        this.remove();
        loadScript(['js/Tone.js'], function (){ 
            window.application = new Application ();
            window.application.start();
        });
    }, true)
}
</script>
</body>
