<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>GuitarLab</title>

    <!-- Ajout du manifeste PWA -->
    <link rel="manifest" href="manifest.json?guitarlab=2x">

    <!-- Définition de la couleur de la barre d'adresse sur les navigateurs mobiles -->
    <meta name="theme-color" content="#3498db">

    <script src="//cdn.jsdelivr.net/npm/eruda"></script>
    <script type="text/javascript">eruda.init();</script>
    <!-- Icônes pour différentes tailles d'écrans -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">

    <meta name="description" content="guitar based music explorer tool">

    <link rel="stylesheet" href="css/gao-fonticons-max.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- Service Worker (à ajouter dans un fichier séparé et enregistré avec l'extension .js) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js?guitarlab=2x')
            .then(function (registration) {
                console.log('Service Worker enregistré avec succès:', registration);
            })
            .catch(function (error) {
                console.log('Erreur lors de l\'enregistrement du Service Worker:', error);
            });
        }
    </script>
        <style type="text/css">
        html, body
        {
            touch-action: manipulation;
            user-select: none;
            font-family: sans-serif;
            background: #9224a0;
            background: #000;
    background: #efefef;
            padding: 0;
            margin: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #start {
            display: block;
            transform: translate(-0%, 0%);
            border: 0px solid #000;
            background: #fff1;
            font-family: sans-serif;
            font-weight: bold;
            height: 100vh;
            margin-top: 0%;
        }
        div#start > img{
            width: 60%;
            height:auto;
            background: #fff0;
            margin: 20%;

        }
    </style>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
    </script>
</head>

<body>
    <div id="start">
        <img src="assets/icon.svg">
    </div>

    <script src="js/Tone.js"></script>
    <script type="module" src="gao.js"></script>
</body>
</html>
