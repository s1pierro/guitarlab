<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>GuitarLab</title>

    <!-- Ajout du manifeste PWA -->
    <link rel="manifest" href="manifest.json?guitarlab=55">

    <!-- Définition de la couleur de la barre d'adresse sur les navigateurs mobiles -->
    <meta name="theme-color" content="#2d1b4e">

    <script src="//cdn.jsdelivr.net/npm/eruda"></script>
    <script type="text/javascript">eruda.init();</script>
    <!-- Icônes pour différentes tailles d'écrans -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">

    <meta name="description" content="guitar based music explorer tool">

    <link rel="stylesheet" href="css/gao-fonticons-max.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- Service Worker (à ajouter dans un fichier séparé et enregistré avec l'extension .js) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js?guitarlab=2x')
            .then(function (registration) {
                console.log('Service Worker enregistré avec succès:', registration);
            })
            .catch(function (error) {
                console.log('Erreur lors de l\'enregistrement du Service Worker:', error);
            });
        }
    </script>
        <style type="text/css">
        html, body {
            touch-action: manipulation;
            user-select: none;
            font-family: sans-serif;
            background: #0a0a1a;
            padding: 0;
            margin: 0;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
        }
        #start {
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100dvh;
            background: radial-gradient(ellipse at center, #2d1b4eaa 0%, #0a0a1acc 70%);
            cursor: pointer;
            z-index: 100;
            transition: opacity 0.6s ease;
        }
        #start.dissolve { opacity: 0; pointer-events: none; }
        div#start > img {
            width: min(42vw, 42vh);
            height: auto;
            animation: pulse 3s ease-in-out infinite;
            filter: drop-shadow(0 0 2.5em #7c3aed66);
        }
        #start-hint {
            margin-top: 2.5em;
            color: #ffffff55;
            font-size: 0.75em;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        #start-hint.ready {
            animation: blink 2.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1);    opacity: 0.85; }
            50%       { transform: scale(1.06); opacity: 1;    }
        }
        @keyframes blink {
            0%, 100% { opacity: 0.25; }
            50%      { opacity: 0.75; }
        }
    </style>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
    </script>
</head>

<body>
    <div id="start">
        <img src="assets/icon.svg">
        <span id="start-hint">touch to start</span>
    </div>

    <script src="js/Tone.js"></script>
    <script type="module" src="gao.js"></script>
</body>
</html>
