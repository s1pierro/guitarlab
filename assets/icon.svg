<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Fond arrondi — bois de rose sombre -->
  <rect width="512" height="512" rx="96" fill="#3d1a00"/>

  <!-- Manche de la loupe -->
  <line x1="352" y1="344" x2="478" y2="470"
        stroke="#f0ddc0" stroke-width="54" stroke-linecap="round"/>

  <!-- Verre de la loupe — fond légèrement plus clair -->
  <circle cx="208" cy="200" r="178" fill="#5c2800"/>

  <!-- ── Rosace ── -->

  <!-- Anneau extérieur -->
  <circle cx="208" cy="200" r="150" fill="none" stroke="#f0ddc0" stroke-width="6"/>

  <!-- 12 points décoratifs à r=112 (tradition luthière) -->
  <circle cx="320" cy="200" r="9" fill="#f0ddc0"/>
  <circle cx="305" cy="256" r="9" fill="#f0ddc0"/>
  <circle cx="264" cy="297" r="9" fill="#f0ddc0"/>
  <circle cx="208" cy="312" r="9" fill="#f0ddc0"/>
  <circle cx="152" cy="297" r="9" fill="#f0ddc0"/>
  <circle cx="111" cy="256" r="9" fill="#f0ddc0"/>
  <circle cx="96"  cy="200" r="9" fill="#f0ddc0"/>
  <circle cx="111" cy="144" r="9" fill="#f0ddc0"/>
  <circle cx="152" cy="103" r="9" fill="#f0ddc0"/>
  <circle cx="208" cy="88"  r="9" fill="#f0ddc0"/>
  <circle cx="264" cy="103" r="9" fill="#f0ddc0"/>
  <circle cx="305" cy="144" r="9" fill="#f0ddc0"/>

  <!-- Anneau intérieur -->
  <circle cx="208" cy="200" r="78" fill="none" stroke="#f0ddc0" stroke-width="6"/>

  <!-- 6 rayons — les 6 cordes -->
  <line x1="208" y1="200" x2="284" y2="200" stroke="#f0ddc0" stroke-width="3" opacity="0.75"/>
  <line x1="208" y1="200" x2="246" y2="266" stroke="#f0ddc0" stroke-width="3" opacity="0.75"/>
  <line x1="208" y1="200" x2="170" y2="266" stroke="#f0ddc0" stroke-width="3" opacity="0.75"/>
  <line x1="208" y1="200" x2="132" y2="200" stroke="#f0ddc0" stroke-width="3" opacity="0.75"/>
  <line x1="208" y1="200" x2="170" y2="134" stroke="#f0ddc0" stroke-width="3" opacity="0.75"/>
  <line x1="208" y1="200" x2="246" y2="134" stroke="#f0ddc0" stroke-width="3" opacity="0.75"/>

  <!-- Trou sonore -->
  <circle cx="208" cy="200" r="42" fill="#5c2800"/>
  <circle cx="208" cy="200" r="42" fill="none" stroke="#f0ddc0" stroke-width="6"/>

  <!-- Cadre de la loupe -->
  <circle cx="208" cy="200" r="178" fill="none" stroke="#f0ddc0" stroke-width="22"/>

</svg>
